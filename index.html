<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Master</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
width:90%;
max-width:380px;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
font-size:32px;
color:#0077ff;
margin-bottom:10px;
}

p{
color:#666;
margin-bottom:25px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#0077ff;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#005fcc;
}

.levels{
margin-top:25px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.level{
background:#f2f2f2;
padding:12px;
border-radius:10px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h1>English Master</h1>

<p>Learn English from A1 to C2</p>
<p><b>Progress: 0%</b></p>

<button onclick="login()">Авторизоваться</button>

<br><br>

<button onclick="startCourse()">Начать обучение</button>

<div class="levels">
<div class="level">A1</div>
<div class="level">A2</div>
<div class="level">B1</div>
<div class="level">B2</div>
<div class="level">C1</div>
<div class="level">C2</div>
</div>

</div>

<script>

function login() {
    let user = prompt("Логин:");
    let pass = prompt("Пароль:");

    if (
        user === localStorage.getItem("user") &&
        pass === localStorage.getItem("pass")
    ) {
        alert("Добро пожаловать, " + user + "!");
    } else {
        alert("Неверный логин или пароль!");
    }
function startCourse() {
    alert("Начинаем курс A1!");
}
</script>
</body>
</html>
