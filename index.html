<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Master</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:20px;
width:90%;
max-width:400px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
color:#0077ff;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:10px;
background:#0077ff;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#005fd1;
}

.levels{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:20px;
}

.level{
background:#f2f2f2;
padding:12px;
border-radius:10px;
font-weight:bold;
}
</style>

</head>
<body>

<div class="card">

<h1>English Master</h1>

<p>Изучай английский от A1 до C2</p>

<button onclick="register()">Регистрация</button>

<button onclick="login()">Войти</button>

<button onclick="startCourse()">Начать обучение</button>

<div class="levels">
<div class="level">A1</div>
<div class="level">A2</div>
<div class="level">B1</div>
<div class="level">B2</div>
<div class="level">C1</div>
<div class="level">C2</div>
</div>

</div>

<script>

function register(){

let user=prompt("Придумайте логин");
if(!user)return;

let pass=prompt("Придумайте пароль");
if(!pass)return;

localStorage.setItem("user",user);
localStorage.setItem("pass",pass);

alert("Регистрация успешна!");

}

function login(){

let user=prompt("Логин");
let pass=prompt("Пароль");

if(user===localStorage.getItem("user") &&
pass===localStorage.getItem("pass")){

alert("Добро пожаловать, "+user+"!");

}else{

alert("Неверный логин или пароль");

}

}

function startCourse(){

alert("Добро пожаловать в курс A1!\n\nУрок 1 откроется в следующем обновлении.");

}

</script>

</body>
</html>
